<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Wear Shop</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1 style="background-color: green; color: white; text-align: center;">School Wear Shop</h1>
        <div id="cart-counter">Items in Cart: <span id="item-count">0</span></div>
    </header>
    <main>
        <section id="product-showcase">
            <h2>Products</h2>
            <div class="product" data-name="School Uniform">
                <h3>School Uniform</h3>
                <button class="add-to-cart">Add to Cart</button>
            </div>
            <div class="product" data-name="Backpack">
                <h3>Backpack</h3>
                <button class="add-to-cart">Add to Cart</button>
            </div>
            <div class="product" data-name="Stationery Set">
                <h3>Stationery Set</h3>
                <button class="add-to-cart">Add to Cart</button>
            </div>
        </section>
    </main>
    <script>
        let cartCount = 0;
        const buttons = document.querySelectorAll('.add-to-cart');
        const itemCountElement = document.getElementById('item-count');

        buttons.forEach(button => {
            button.addEventListener('click', () => {
                cartCount++;
                itemCountElement.textContent = cartCount;
                notifyUser();
                saveToLocalStorage(cartCount);
            });
        });

        function notifyUser() {
            alert('Item added to cart!');
        }

        function saveToLocalStorage(count) {
            localStorage.setItem('cartCount', count);
        }
    </script>
</body>
</html>
